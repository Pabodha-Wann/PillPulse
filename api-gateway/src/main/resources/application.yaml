server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: pharmacy-service
          uri: lb://pharmacy-service
          predicates:
            - Path=/api/pharmacies/**

        - id: medicine-service
          uri: lb://medicine-service
          predicates:
            - Path=/api/medicines/**

        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**

        - id: alert-service
          uri: lb://alert-service
          predicates:
            - Path=/api/alerts/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true