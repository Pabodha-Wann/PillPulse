server:
  port: 8081


spring:
  application:
    name: pharmacy-service

  datasource:  #connect to PostgreSQL
    url: jdbc:postgresql://localhost:5432/pharmacy_db
    username: postgres
    password: 20031217
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:/db/migration

# eureka configurations
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/  # tells WHERE eureka server is

  instance:
    preferIpAddress: true


